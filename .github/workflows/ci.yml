name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: Pipeline, lint, tests, notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Fetch real data
        run: python data/fetch_data.py

      - name: Build pipeline (validates curated tables)
        run: python -m analytics.build

      - name: Lint
        run: ruff check src tests data

      - name: Tests
        run: pytest -q

      - name: Register notebook kernel
        run: python -m ipykernel install --user --name olist --display-name "Python (olist)"

      - name: Execute notebooks (proves they run end-to-end)
        run: pytest --nbmake notebooks/ -q

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
